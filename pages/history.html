<title>Passio — 풀이 히스토리</title>

</head>
<body>
<div class="page">
  <header class="nav">
    <div class="nav-left">
      <a class="nav-logo" href="/pages/index.html" aria-label="홈으로 이동">
        <span class="logo-mark" aria-hidden="true"><svg viewBox="0 0 15 15"><path d="M7.5 1.5l2 4 4.4.6-3.2 3.1.8 4.4-4-2.1-4 2.1.8-4.4-3.2-3.1 4.4-.6z"/></svg></span>
        <span class="nav-brand-name">Passio</span>
      </a>
      <nav class="nav-menu" aria-label="페이지 이동">
        <a class="nav-link" href="/pages/dashboard.html">대시보드</a>
        <a class="nav-link" href="/pages/ai-explain.html">AI 해설</a>
        <a class="nav-link" href="/pages/question-bank.html?v=20260417b">문제은행</a>
        <a class="nav-link active" href="/pages/history.html">히스토리</a>
        <a class="nav-link" href="/pages/api-token.html">API 토큰</a>
      </nav>
    </div>
    <div class="nav-r">
      <span class="nav-user" id="ava-history">학습자</span>
      <button class="btn btn-out btn-sm" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="container section history-layout" style="max-width:1100px;">
    <section class="dash-headline" style="margin-bottom:18px;">
      <span class="dash-pill">Study History</span>
      <h2 style="font-size:2.1rem;margin:0 0 8px 0;"><span id="user-name">학습자</span>님의 학습 기록</h2>
      <p class="sub" style="font-size:1.08rem;">퀴즈 풀이와 AI 해설 생성 내역을 한눈에 확인하세요.</p>
    </section>

    <div class="history-toolbar" style="display:flex;gap:10px;margin-bottom:18px;">
      <a class="btn btn-out btn-sm" href="/pages/dashboard.html">퀴즈 시작</a>
      <a class="btn btn-navy btn-sm" href="/pages/ai-explain.html">새 AI 해설</a>
    </div>

    <div class="history-2col" style="display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start;">
      <section class="history-group-col" style="background:var(--surface);border-radius:16px;padding:22px 18px 18px 18px;box-shadow:0 2px 12px rgba(37,51,80,0.07);border:1.2px solid var(--navy-b);">
        <div class="history-group-head" style="margin-bottom:10px;">
          <h3 style="font-size:1.15rem;margin:0 0 2px 0;">퀴즈 풀이 기록</h3>
        </div>
        <section id="quiz-history-list" class="history-list"></section>
        <div id="quiz-history-more-wrap" style="margin-top:12px;">
          <button type="button" class="btn btn-out btn-sm" id="btn-quiz-history-more" style="display:none;">이전 퀴즈 기록 더 보기</button>
        </div>
        <section id="quiz-history-empty" class="card panel" style="display:none;text-align:center;background:var(--s1);border-radius:10px;">아직 저장된 퀴즈 기록이 없습니다.</section>
      </section>
      <section class="history-group-col" style="background:var(--surface);border-radius:16px;padding:22px 18px 18px 18px;box-shadow:0 2px 12px rgba(37,51,80,0.07);border:1.2px solid var(--navy-b);">
        <div class="history-group-head" style="margin-bottom:10px;">
          <h3 style="font-size:1.15rem;margin:0 0 2px 0;">AI 해설 기록</h3>
        </div>
        <section id="rag-history-list" class="history-list"></section>
        <div id="rag-history-more-wrap" style="margin-top:12px;">
          <button type="button" class="btn btn-out btn-sm" id="btn-rag-history-more" style="display:none;">이전 AI 해설 더 보기</button>
        </div>
        <section id="rag-history-empty" class="card panel" style="display:none;text-align:center;background:var(--s1);border-radius:10px;">아직 저장된 AI 해설 기록이 없습니다.</section>
      </section>
    </div>
  </main>
</div>
<script src="/assets/js/quiz-ai-blocks.js?v=20260419unifiedAi"></script>
<script src="/assets/js/history-page.js?v=20260419ragOrder"></script>
