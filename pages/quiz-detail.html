<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passio — 퀴즈 상세 (주소 변경)</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<style>
  body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
  a { color: #1a3a6e; }
</style>
</head>
<body>
<p>퀴즈 세션 상세 주소가 <strong><code>/pages/quiz-attempt.html</code></strong> 로 바뀌었습니다. 잠시 후 자동 이동합니다.</p>
<p><a id="quiz-detail-redirect-link" href="/pages/quiz-attempt.html">바로 가기</a></p>
<script>
(function () {
  var next = "/pages/quiz-attempt.html" + (window.location.search || "") + (window.location.hash || "");
  var a = document.getElementById("quiz-detail-redirect-link");
  if (a) {
    a.setAttribute("href", next);
  }
  window.location.replace(next);
})();
</script>
</body>
</html>
