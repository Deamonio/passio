user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  types_hash_max_size 4096;
  client_max_body_size 10m;
  server_tokens off;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  limit_req_zone $binary_remote_addr zone=global_per_ip:10m rate=30r/s;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index pages/index.html;

    include /etc/nginx/security-headers.conf;

    limit_req zone=global_per_ip burst=60 nodelay;

    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    # 옛 HTML이 quiz-session-page.js 를 가리킬 때도 최신 번들 제공
    location = /assets/js/quiz-session-page.js {
      rewrite ^ /assets/js/quiz-session.js last;
    }

    # 구식/캐시 JS가 POST /api/rag/jobs 로내도 Node rag2와 동일하게 처리 (HTML·JS 배포 전에도 동작)
    location = /api/rag/jobs {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_pass http://app:3100/api/rag2/jobs;
    }

    # POST /api/rag2/jobs 로 만든 작업은 Node DB에만 있음. 아래보다 짧은 /api/rag/ 가 Python으로 가면 폴링이 깨짐.
    location ^~ /api/rag/jobs/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_pass http://app:3100;
    }

    location = /api/rag/history {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_pass http://app:3100;
    }

    location /api/rag/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 10s;
      proxy_send_timeout 900s;
      proxy_read_timeout 900s;
      proxy_pass http://py-api:8000;
    }

    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
      proxy_pass http://app:3100;
    }

    # JS/CSS: 디스크 캐시 사용 안 함 → 일반 새로고침·뒤로가기 후에도 항상 최신
    location ~* \.(?:css|js|mjs)$ {
      expires -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      include /etc/nginx/security-headers.conf;
      try_files $uri =404;
    }

    location ~* \.(?:json|jpg|jpeg|gif|png|svg|ico|webp|avif|woff|woff2|ttf)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
      include /etc/nginx/security-headers.conf;
      try_files $uri =404;
    }

    location = /index.html {
      return 302 /pages/index.html;
    }

    location = /login.html {
      return 302 /pages/login.html;
    }

    location = /signup.html {
      return 302 /pages/signup.html;
    }

    location = /quiz.html {
      return 302 /pages/quiz.html;
    }

    location = /dashboard.html {
      return 302 /pages/dashboard.html;
    }

    location = /history.html {
      return 302 /pages/history.html;
    }

    location = /api-guide.html {
      return 302 /pages/api-guide.html;
    }

    location = /pages/quiz-detail.html {
      return 302 /pages/quiz-attempt.html$is_args$args;
    }

    location = /pages/index.html {
      expires -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
      include /etc/nginx/security-headers.conf;
      try_files $uri =404;
    }

    # 앱 페이지 HTML은 오래 캐시되면 ?v= 구식 스크립트가 묶인 채로 남을 수 있음 (no-store)
    location ~* \.html$ {
      expires -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
      include /etc/nginx/security-headers.conf;
      try_files $uri =404;
    }

    location / {
      try_files $uri /pages/index.html;
    }
  }
}
